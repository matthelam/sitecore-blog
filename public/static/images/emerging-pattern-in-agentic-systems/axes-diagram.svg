<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="300" fill="#ffffff" rx="12"/>

  <!-- Connecting lines (dashed) -->
  <line x1="170" y1="137" x2="271" y2="186" stroke="#d1d5db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <line x1="320" y1="100" x2="320" y2="155" stroke="#d1d5db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <line x1="470" y1="137" x2="370" y2="186" stroke="#d1d5db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>

  <!-- Agent box -->
  <rect x="20" y="95" width="150" height="85" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="95" y="124" text-anchor="middle" fill="#4f46e5" font-size="13" font-weight="700">Agent</text>
  <text x="95" y="144" text-anchor="middle" fill="#6b7280" font-size="11">Posture</text>
  <text x="95" y="162" text-anchor="middle" fill="#6b7280" font-size="11">HOW to think</text>

  <!-- Skills + CLI box -->
  <rect x="245" y="15" width="150" height="85" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="44" text-anchor="middle" fill="#059669" font-size="13" font-weight="700">Skills + CLI</text>
  <text x="320" y="64" text-anchor="middle" fill="#6b7280" font-size="11">Interaction</text>
  <text x="320" y="82" text-anchor="middle" fill="#6b7280" font-size="11">HOW to act</text>

  <!-- MCP box -->
  <rect x="470" y="95" width="150" height="85" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="545" y="124" text-anchor="middle" fill="#d97706" font-size="13" font-weight="700">MCP</text>
  <text x="545" y="144" text-anchor="middle" fill="#6b7280" font-size="11">Knowledge</text>
  <text x="545" y="162" text-anchor="middle" fill="#6b7280" font-size="11">WHAT is known</text>

  <!-- Execution circle -->
  <circle cx="320" cy="210" r="55" fill="#1f2937"/>
  <text x="320" y="204" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Context at</text>
  <text x="320" y="222" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Execution</text>

  <!-- Note -->
  <text x="320" y="285" text-anchor="middle" fill="#9ca3af" font-size="10">simultaneous, not sequential</text>
</svg>
