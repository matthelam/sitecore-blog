<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 780 540" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Recall sequence: on the agent side the Clarity Assessment surfaces doubt, raising an Ambiguity Event and a decision to seek memory; that is redirected into the Legal Check, which queries the Obsidian MCP, which graph-searches and ranks the Common Law; ranked precedent returns back through the MCP and the Legal Check as a snippet into the prompt, or the agent escalates.">
<title>Part II recall sequence: Clarity Assessment to precedent in the prompt</title>
<style>
text{font-family:"Anthropic Sans",-apple-system,system-ui,sans-serif}
.t{font-size:14px;fill:#3d3d3a}.ts{font-size:11.5px;fill:#73726c}.th{font-size:13.5px;font-weight:500}
.amb{fill:#FAEEDA;stroke:#854F0B}.amb-t{fill:#633806}.amb-s{fill:#854F0B}
.pur{fill:#EEEDFE;stroke:#534AB7}.pur-t{fill:#3C3489}.pur-s{fill:#534AB7}
.gry{fill:#F1EFE8;stroke:#5F5E5A}.gry-t{fill:#2C2C2A}.gry-s{fill:#444441}
.nt{fill:#FFFFFF;stroke:#2C2C2A}.nt-t{fill:#2C2C2A}.nt-s{fill:#5F5E5A}
.ll{stroke:#9c9a92;stroke-width:1;stroke-dasharray:4 4}
.act{fill:#e9e7df;stroke:#9c9a92;stroke-width:0.5}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.arrd{stroke:#73726c;stroke-width:1.5;fill:none;stroke-dasharray:5 3}
@media (prefers-color-scheme:dark){
.t{fill:#c2c0b6}.ts{fill:#9c9a92}
.amb{fill:#633806;stroke:#FAC775}.amb-t{fill:#FAEEDA}.amb-s{fill:#FAC775}
.pur{fill:#3C3489;stroke:#CECBF6}.pur-t{fill:#EEEDFE}.pur-s{fill:#CECBF6}
.gry{fill:#2C2C2A;stroke:#B4B2A9}.gry-t{fill:#F1EFE8}.gry-s{fill:#cfcdc4}
.nt{fill:#1a1a18;stroke:#cfcdc4}.nt-t{fill:#F1EFE8}.nt-s{fill:#cfcdc4}
.ll{stroke:#6f6e69}.act{fill:#3a3a36;stroke:#6f6e69}.arr{stroke:#9c9a92}.arrd{stroke:#9c9a92}
}
</style>
<defs>
<marker id="seqarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<line x1="95" y1="64" x2="95" y2="458" class="ll"/>
<line x1="300" y1="64" x2="300" y2="458" class="ll"/>
<line x1="510" y1="64" x2="510" y2="458" class="ll"/>
<line x1="700" y1="64" x2="700" y2="458" class="ll"/>

<rect class="act" x="91" y="246" width="8" height="202"/>
<rect class="act" x="296" y="246" width="8" height="202"/>
<rect class="act" x="506" y="288" width="8" height="120"/>
<rect class="act" x="696" y="328" width="8" height="40"/>

<rect class="nt" x="40" y="18" width="110" height="46" rx="8" stroke-width="1"/>
<text class="th nt-t" x="95" y="41" text-anchor="middle" dominant-baseline="central">Agent</text>
<rect class="pur" x="240" y="18" width="120" height="46" rx="8" stroke-width="0.5"/>
<text class="th pur-t" x="300" y="41" text-anchor="middle" dominant-baseline="central">Legal Check</text>
<rect class="pur" x="450" y="18" width="120" height="46" rx="8" stroke-width="0.5"/>
<text class="th pur-t" x="510" y="41" text-anchor="middle" dominant-baseline="central">Obsidian MCP</text>
<rect class="amb" x="640" y="18" width="120" height="46" rx="8" stroke-width="0.5"/>
<text class="th amb-t" x="700" y="41" text-anchor="middle" dominant-baseline="central">Common Law</text>

<rect class="amb" x="20" y="76" width="150" height="38" rx="8" stroke-width="0.5"/>
<text class="th amb-t" x="95" y="95" text-anchor="middle" dominant-baseline="central">Clarity Assessment</text>

<rect class="amb" x="20" y="128" width="150" height="38" rx="8" stroke-width="0.5"/>
<text class="th amb-t" x="95" y="147" text-anchor="middle" dominant-baseline="central">Ambiguity Event</text>

<rect class="amb" x="20" y="180" width="150" height="38" rx="8" stroke-width="0.5"/>
<text class="th amb-t" x="95" y="199" text-anchor="middle" dominant-baseline="central">Seek memory</text>

<line x1="95" y1="114" x2="95" y2="126" class="arr" marker-end="url(#seqarr)"/>
<line x1="95" y1="166" x2="95" y2="178" class="arr" marker-end="url(#seqarr)"/>
<line x1="95" y1="218" x2="95" y2="244" class="arr" marker-end="url(#seqarr)"/>

<line x1="99" y1="246" x2="294" y2="246" class="arr" marker-end="url(#seqarr)"/>
<text class="ts" x="197" y="238" text-anchor="middle">redirected: invoke (tags + task)</text>

<line x1="304" y1="288" x2="504" y2="288" class="arr" marker-end="url(#seqarr)"/>
<text class="ts" x="405" y="280" text-anchor="middle">query over MCP</text>

<line x1="514" y1="328" x2="694" y2="328" class="arr" marker-end="url(#seqarr)"/>
<text class="ts" x="605" y="320" text-anchor="middle">search &amp; rank</text>

<line x1="696" y1="368" x2="516" y2="368" class="arrd" marker-end="url(#seqarr)"/>
<text class="ts" x="605" y="360" text-anchor="middle">ranked precedent</text>

<line x1="506" y1="408" x2="306" y2="408" class="arrd" marker-end="url(#seqarr)"/>
<text class="ts" x="405" y="400" text-anchor="middle">results</text>

<line x1="296" y1="448" x2="101" y2="448" class="arrd" marker-end="url(#seqarr)"/>
<text class="ts" x="197" y="440" text-anchor="middle">precedent snippet</text>

<rect class="nt" x="26" y="466" width="210" height="36" rx="8" stroke-width="1"/>
<text class="ts nt-t" x="131" y="485" text-anchor="middle" dominant-baseline="central">into the prompt &#8212; else escalate</text>

<rect class="nt" x="150" y="508" width="12" height="12" rx="3"/>
<text class="ts" x="168" y="518" text-anchor="start">agent</text>
<rect class="pur" x="300" y="508" width="12" height="12" rx="3"/>
<text class="ts" x="318" y="518" text-anchor="start">Legal Check / MCP</text>
<rect class="amb" x="480" y="508" width="12" height="12" rx="3"/>
<text class="ts" x="498" y="518" text-anchor="start">cognitive step / Common Law</text>
</svg>
